<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pbsgui</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <span class="brand">pbsgui</span>
      <span class="spacer"></span>
      <span class="engine">engine: <strong id="engine-status">checking...</strong></span>
    </header>

    <main class="content">
      <section class="card">
        <h1>Back up to Proxmox Backup Server</h1>
        <p class="muted">
          Streams a file to PBS as a fixed-index image. The engine must be
          reachable (the app tries to start it automatically).
        </p>

        <form id="backup-form" autocomplete="off">
          <label>Repository
            <input id="repository" type="text" required
                   placeholder="user@pbs!token@host:8007:datastore" />
          </label>
          <label>API token secret
            <input id="secret" type="password" required placeholder="token secret" />
          </label>
          <label>Server fingerprint (SHA-256)
            <input id="fingerprint" type="text" required placeholder="AA:BB:..:FF" />
          </label>
          <div class="row">
            <label>Backup id
              <input id="backup_id" type="text" required value="pbsgui-host" />
            </label>
            <label>File to back up
              <input id="path" type="text" required placeholder="C:\\path\\to\\file" />
            </label>
          </div>

          <div class="actions">
            <button type="button" id="test-btn">Test engine</button>
            <button type="submit" id="backup-btn" class="primary">Back up</button>
          </div>
        </form>

        <div class="progress-wrap">
          <div class="progress-track"><div id="progress-bar" class="progress-bar"></div></div>
          <span id="progress-label" class="muted">idle</span>
        </div>
      </section>

      <section class="card">
        <h2>Log</h2>
        <pre id="log" class="log"></pre>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
