name: Release

# Build the Windows installer and publish a GitHub Release when a version tag is
# pushed (for example `v0.0.1`). The tag drives the version stamped into the app.
#
# Code signing is OPTIONAL and self-enabling: when the DigiCert KeyLocker secrets
# are configured the inner engine exe, the app exe, and the installer are signed;
# otherwise the build proceeds unsigned, so releases keep working before the
# certificate is provisioned. To enable signing, set:
#   secrets: SM_API_KEY, SM_CLIENT_CERT_FILE_B64, SM_CLIENT_CERT_PASSWORD
#   vars:    SM_HOST, SM_CODE_SIGNING_CERT_SHA1_HASH
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the release and upload the installer

env:
  CARGO_TERM_COLOR: always

jobs:
  release-windows:
    name: Build and publish installer (Windows)
    runs-on: windows-latest
    env:
      # DigiCert KeyLocker (empty until the secrets/vars are set -> unsigned build).
      SM_HOST: ${{ vars.SM_HOST }}
      SM_API_KEY: ${{ secrets.SM_API_KEY }}
      SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}
      SM_CODE_SIGNING_CERT_SHA1_HASH: ${{ vars.SM_CODE_SIGNING_CERT_SHA1_HASH }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install NASM (needed to build ring)
        uses: ilammy/setup-nasm@v1
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Detect code-signing availability
        id: signing
        shell: bash
        run: |
          if [ -n "$SM_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Code signing: ENABLED (DigiCert secrets present)."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Code signing: disabled (DigiCert secrets not set); building unsigned."
          fi

      - name: Set up DigiCert KeyLocker
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          # Decode the client-auth cert (mTLS to Software Trust Manager).
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.p12", [Convert]::FromBase64String("${{ secrets.SM_CLIENT_CERT_FILE_B64 }}"))
          "SM_CLIENT_CERT_FILE=$env:RUNNER_TEMP\cert.p12" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          # Install the KeyLocker client tools (smctl + KSP) and sync the cert into
          # the Windows store so signtool can sign through the cloud key.
          curl.exe -X GET "https://one.digicert.com/signingmanager/api-ui/v1/releases/Keylockertools-windows-x64.msi/download" -H "x-api-key:$env:SM_API_KEY" -o "$env:RUNNER_TEMP\keylockertools.msi"
          Start-Process msiexec.exe -ArgumentList "/i `"$env:RUNNER_TEMP\keylockertools.msi`" /quiet /qn" -Wait
          $ssm = "C:\Program Files\DigiCert\DigiCert KeyLocker Tools"
          "$ssm" | Out-File $env:GITHUB_PATH -Append -Encoding utf8
          & "$ssm\smctl.exe" windows certsync

      - name: Compute version from the tag
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          $short = "${{ github.sha }}".Substring(0, 7)
          "PBSGUI_VERSION=$ver"        | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "PBSGUI_BUILD=$ver ($short)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          '{"version":"' + $ver + '"}' | Out-File -FilePath build-version.json -Encoding ascii

      - name: Build engine
        run: cargo build -p pbsgui-engine --release

      - name: Sign engine
        # Tauri signs the app exe and installer via signCommand, but the sidecar
        # engine exe is signed explicitly here before it is staged.
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        working-directory: src-tauri
        run: ./sign-windows.ps1 ../target/release/pbsgui-engine.exe

      - name: Stage engine as a Tauri sidecar
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Copy-Item target/release/pbsgui-engine.exe `
            src-tauri/binaries/pbsgui-engine-x86_64-pc-windows-msvc.exe

      - name: Build app and NSIS installers (offline + online)
        # engine-sidecar.conf.json bundles the engine sidecar; build-version.json
        # stamps the version; signing.conf.json (signCommand) is appended only when
        # signing is enabled. We build twice: the default bundles WebView2 (offline,
        # air-gapped), then webview-online.conf.json makes a smaller installer that
        # downloads WebView2 at install. The second build only re-bundles (the Rust
        # binaries are unchanged), so it is quick.
        shell: pwsh
        run: |
          $configs = @('--config', 'src-tauri/engine-sidecar.conf.json', '--config', 'build-version.json')
          if ('${{ steps.signing.outputs.enabled }}' -eq 'true') {
            $configs += @('--config', 'src-tauri/signing.conf.json')
          }
          $nsis = 'target/release/bundle/nsis'
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          # 1) Full offline installer (bundles WebView2).
          tauri build @configs
          $full = Get-ChildItem "$nsis/*-setup.exe" | Select-Object -First 1
          Copy-Item $full.FullName "dist/$($full.Name)"
          # 2) Small online installer (downloads WebView2 at install); same name in
          #    the bundle dir, so copy it out with an -online suffix.
          tauri build @configs --config src-tauri/webview-online.conf.json
          $small = Get-ChildItem "$nsis/*-setup.exe" | Select-Object -First 1
          Copy-Item $small.FullName ("dist/{0}-online{1}" -f $small.BaseName, $small.Extension)
          Get-ChildItem dist | Select-Object Name, Length

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: pbsgui ${{ github.ref_name }}
          body_path: .github/RELEASE_NOTES.md
          # Append the auto-generated commit/PR list since the previous tag.
          generate_release_notes: true
          files: dist/*.exe
          fail_on_unmatched_files: true
